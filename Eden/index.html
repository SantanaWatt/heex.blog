     <!-- Este es para el efecto de maquina de escribir (Typewriter) -->
    <script>
    const text = "El Edén es un proyecto dedicado a la creación de hortalizas sostenibles para consumo personal.";
    const speed = 50; // milisegundos por letra uwu

    let i = 0;
    const target = document.getElementById("typewriter");

    function typeWriter() {
        if (i < text.length) {
            target.textContent += text.charAt(i);
            i++;
            setTimeout(typeWriter, speed);
        }
    }

    window.onload = typeWriter;
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    once: false,    // Si quieres que se repita cada vez que subas y bajes
