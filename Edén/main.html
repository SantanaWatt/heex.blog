<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="javascript" href="script.js">   
    <title>El Edén</title>
</head>
<body class="webstyle1">
    <!-- OLA WE -->
    <a><h1 class="title">EL EDÉN</h1></a>

    <center><a id="typewriter"></a></center>

    <center><img src="Assets/Images/Spiritual.jpg"></img></center>

    <!-- SCRIPTS -->
    <script>
    const text = "El Edén es un proyecto dedicado a la creación de invernaderos sostenibles para consumo propio.";
    const speed = 50; // milisegundos por letra

    let i = 0;
    const target = document.getElementById("typewriter");

    function typeWriter() {
        if (i < text.length) {
            target.textContent += text.charAt(i);
            i++;
            setTimeout(typeWriter, speed);
        }
    }

    window.onload = typeWriter;
    </script>

</body>
</html>
